<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お天気</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe3ee;
      --primary: #2563eb;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
      background: linear-gradient(180deg, #eef5ff 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      width: min(720px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
    }

    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      padding: 12px 18px;
      font-size: 0.95rem;
      min-height: 48px;
      cursor: pointer;
      box-shadow: var(--shadow);
      touch-action: manipulation;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .clock {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 200;
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1;
      margin: 0 0 4px;
    }

    .clock-date {
      font-size: 0.9rem;
      color: var(--muted);
      margin: 0;
    }

    .updated-at {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .status {
      margin-bottom: 16px;
      min-height: 24px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .status.error {
      color: #b91c1c;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .place {
      margin: 0;
      font-size: 1.25rem;
    }

    .region {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .icon {
      font-size: 2.2rem;
    }

    .temp-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 6px;
    }

    .temp {
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1;
    }

    .condition {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 1rem;
    }

    .alert-banner {
      margin: 0 0 18px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }

    .alert-title {
      margin-bottom: 6px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .alert-list {
      margin: 0;
      padding-left: 18px;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .meta-item {
      border-radius: 14px;
      background: #f8fbff;
      border: 1px solid #e5edf7;
      padding: 12px;
    }

    .meta-label {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 4px;
    }

    .meta-value {
      font-size: 1rem;
      font-weight: 600;
    }

    .forecast {
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .forecast-title {
      margin: 0 0 12px;
      font-size: 0.98rem;
      font-weight: 700;
    }

    .forecast-controls {
      display: grid;
      gap: 12px;
    }

    .forecast-toggle {
      width: 100%;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      box-shadow: none;
    }

    .forecast-list {
      display: grid;
      gap: 12px;
    }

    .forecast-list[hidden] {
      display: none;
    }

    .forecast-detail {
      padding: 14px;
      border-radius: 16px;
      background: #f8fbff;
      border: 1px solid #e5edf7;
    }

    .forecast-detail.clear {
      background: #fff9e8;
      border-color: #fde68a;
    }

    .forecast-detail.cloudy {
      background: #f3f6fb;
      border-color: #d7e0ec;
    }

    .forecast-detail.rainy {
      background: #eaf4ff;
      border-color: #7cb3ff;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.08);
    }

    .forecast-detail.snowy {
      background: #f4f7ff;
      border-color: #c7d2fe;
    }

    .forecast-detail.stormy {
      background: #fef2f2;
      border-color: #fca5a5;
    }

    .forecast-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .forecast-day {
      font-weight: 700;
    }

    .forecast-main {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
    }

    .forecast-icon {
      font-size: 1.35rem;
    }

    .forecast-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .forecast-meta-item {
      border-radius: 12px;
      background: #ffffff;
      border: 1px solid #e5edf7;
      padding: 10px;
    }

    .forecast-meta-label {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 4px;
    }

    .forecast-meta-value {
      font-weight: 600;
    }

    .forecast-rain-value {
      color: #2563eb;
    }

    .forecast-holiday {
      font-size: 0.72rem;
      color: #dc2626;
      font-weight: 600;
      margin-left: 4px;
    }

    .forecast-rain-value.emphasis {
      color: #b91c1c;
      font-weight: 700;
    }

    .pollen-banner {
      margin: 0 0 18px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #fefce8;
      border: 1px solid #fde68a;
    }

    .pollen-banner-title {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #92400e;
    }

    .pollen-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .pollen-item {
      border-radius: 10px;
      background: #fff;
      border: 1px solid #fde68a;
      padding: 8px 10px;
    }

    .pollen-item-label {
      font-size: 0.78rem;
      color: #78716c;
      margin-bottom: 2px;
    }

    .pollen-item-value {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .pollen-level-low    { color: #16a34a; }
    .pollen-level-mid    { color: #d97706; }
    .pollen-level-high   { color: #dc2626; }
    .pollen-level-none   { color: #9ca3af; }

    @media (max-width: 720px) {
      .pollen-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .container {
        width: min(100%, calc(100% - 20px));
        padding: 20px 0 36px;
      }

      .header {
        flex-direction: column;
        gap: 12px;
        margin-bottom: 18px;
      }

      .actions {
        align-items: flex-start;
        width: 100%;
      }

      .actions button,
      .forecast-toggle {
        width: 100%;
        font-size: 1rem;
      }

      .updated-at {
        width: 100%;
        text-align: left;
        font-size: 0.85rem;
      }

      .status {
        margin-bottom: 12px;
      }

      .card {
        padding: 18px;
        border-radius: 18px;
      }

      .card-head {
        margin-bottom: 12px;
      }

      .place {
        font-size: 1.15rem;
      }

      .icon {
        font-size: 1.9rem;
      }

      .temp {
        font-size: 2.15rem;
      }

      .condition {
        margin-bottom: 14px;
        font-size: 0.95rem;
      }

      .alert-banner {
        padding: 10px 12px;
      }

      .alert-list {
        padding-left: 16px;
        font-size: 0.88rem;
      }

      .meta,
      .forecast-meta {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .forecast {
        margin-top: 16px;
        padding-top: 14px;
      }

      .forecast-title {
        margin-bottom: 10px;
      }

      .forecast-controls,
      .forecast-list {
        gap: 10px;
      }

      .forecast-detail {
        padding: 12px;
        border-radius: 14px;
      }

      .forecast-meta-item {
        padding: 9px 10px;
      }

      .forecast-head,
      .forecast-main {
        align-items: flex-start;
        flex-direction: column;
        gap: 6px;
      }
    }

    @media (max-width: 420px) {
      h1 {
        font-size: 1.55rem;
      }

      .lead {
        font-size: 0.92rem;
      }

      .card {
        padding: 16px;
      }

      .temp {
        font-size: 1.95rem;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="header">
      <div>
        <p class="clock" id="clock">--:--:--</p>
        <p class="clock-date" id="clockDate"></p>
        <p class="lead">丹羽郡</p>
      </div>
      <div class="actions">
        <button id="reloadButton" type="button">最新の天気を取得</button>
        <div class="updated-at" id="updatedAt">未取得</div>
      </div>
    </section>

    <div class="status" id="status">天気情報を読み込みます...</div>
    <section id="weatherCard"></section>
  </main>

  <script>
    const targetLocation = { name: "丹羽郡", region: "愛知県", latitude: 35.367, longitude: 136.869 };

    const weatherMap = {
      0: { text: "快晴", icon: "☀️" },
      1: { text: "ほぼ晴れ", icon: "🌤️" },
      2: { text: "晴れ時々くもり", icon: "⛅" },
      3: { text: "くもり", icon: "☁️" },
      45: { text: "霧", icon: "🌫️" },
      48: { text: "霧氷", icon: "🌫️" },
      51: { text: "弱い霧雨", icon: "🌦️" },
      53: { text: "霧雨", icon: "🌦️" },
      55: { text: "強い霧雨", icon: "🌧️" },
      61: { text: "弱い雨", icon: "🌧️" },
      63: { text: "雨", icon: "🌧️" },
      65: { text: "強い雨", icon: "🌧️" },
      71: { text: "弱い雪", icon: "🌨️" },
      73: { text: "雪", icon: "❄️" },
      75: { text: "強い雪", icon: "❄️" },
      80: { text: "にわか雨", icon: "🌦️" },
      81: { text: "やや強いにわか雨", icon: "🌧️" },
      82: { text: "激しいにわか雨", icon: "⛈️" },
      95: { text: "雷雨", icon: "⛈️" }
    };

    const statusEl = document.getElementById("status");
    const cardEl = document.getElementById("weatherCard");
    const updatedAtEl = document.getElementById("updatedAt");
    const reloadButton = document.getElementById("reloadButton");
    const requestTimeoutMs = 15000;

    function weatherInfo(code) {
      return weatherMap[code] || { text: "不明", icon: "❔" };
    }

    function formatNumber(value) {
      return Math.round(value);
    }

    function formatDayLabel(dateText) {
      const date = new Date(`${dateText}T00:00:00`);
      const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
      return `${date.getMonth() + 1}/${date.getDate()}(${weekdays[date.getDay()]})`;
    }

    function buildForecastDays(daily, holidays = {}) {
      return daily.time.slice(1).map((dateText, index) => ({
        dateText,
        dateLabel: formatDayLabel(dateText),
        holiday: holidays[dateText] || null,
        weatherCode: daily.weather_code[index + 1],
        tempMax: formatNumber(daily.temperature_2m_max[index + 1]),
        tempMin: formatNumber(daily.temperature_2m_min[index + 1]),
        precipitationProbability: daily.precipitation_probability_max[index + 1]
      }));
    }

    function getForecastTone(day) {
      const rainyCodes = [51, 53, 55, 61, 63, 65, 80, 81, 82];
      const snowyCodes = [71, 73, 75];

      if (day.weatherCode === 95) {
        return "stormy";
      }

      if (day.precipitationProbability >= 60 || rainyCodes.includes(day.weatherCode)) {
        return "rainy";
      }

      if (snowyCodes.includes(day.weatherCode)) {
        return "snowy";
      }

      if ([3, 45, 48].includes(day.weatherCode)) {
        return "cloudy";
      }

      return "clear";
    }

    function createHighRainAlert(forecastDays) {
      const rainyDays = forecastDays.filter((day) => day.precipitationProbability >= 60);
      if (rainyDays.length === 0) {
        return "";
      }

      const items = rainyDays.map((day) => (
        `<li>${day.dateLabel}: 降水確率 ${day.precipitationProbability}%</li>`
      )).join("");

      return `
        <section class="alert-banner">
          <div class="alert-title">降水確率60%以上の日</div>
          <ul class="alert-list">${items}</ul>
        </section>
      `;
    }

    function createForecastList(days) {
      const items = days.map((day) => createForecastDetail(day)).join("");
      return `
        <div class="forecast-controls">
          <button class="forecast-toggle" type="button" aria-expanded="false">
            明日以降を表示
          </button>
          <div class="forecast-list" id="forecast-list" hidden>
            ${items}
          </div>
        </div>
      `;
    }

    function createForecastDetail(day) {
      const info = weatherInfo(day.weatherCode);
      const toneClass = getForecastTone(day);
      const rainClass = day.precipitationProbability >= 60 ? "forecast-rain-value emphasis" : "forecast-rain-value";
      const holidayHtml = day.holiday
        ? `<span class="forecast-holiday">${day.holiday}</span>`
        : "";
      return `
        <div class="forecast-detail ${toneClass}">
          <div class="forecast-head">
            <div class="forecast-day">${day.dateLabel}${holidayHtml}</div>
            <div class="forecast-main">
              <span class="forecast-icon" aria-hidden="true">${info.icon}</span>
              <span>${info.text}</span>
            </div>
          </div>
          <div class="forecast-meta">
            <div class="forecast-meta-item">
              <div class="forecast-meta-label">最高 / 最低気温</div>
              <div class="forecast-meta-value">${day.tempMax}°C / ${day.tempMin}°C</div>
            </div>
            <div class="forecast-meta-item">
              <div class="forecast-meta-label">降水確率</div>
              <div class="${rainClass}">${day.precipitationProbability}%</div>
            </div>
          </div>
        </div>
      `;
    }

    function initializeForecastToggle() {
      const button = document.querySelector(".forecast-toggle");
      const listEl = document.getElementById("forecast-list");
      if (!button || !listEl) {
        return;
      }

      button.addEventListener("click", () => {
        const isExpanded = button.getAttribute("aria-expanded") === "true";
        button.setAttribute("aria-expanded", String(!isExpanded));
        button.textContent = isExpanded ? "明日以降を表示" : "明日以降を隠す";
        listEl.hidden = isExpanded;
      });
    }

    function getPollenLevel(pm10) {
      if (pm10 === null || pm10 === undefined) return { label: "データなし", cls: "pollen-level-none" };
      if (pm10 < 15)  return { label: "少ない", cls: "pollen-level-low" };
      if (pm10 < 35)  return { label: "やや多い", cls: "pollen-level-mid" };
      return { label: "多い", cls: "pollen-level-high" };
    }

    async function fetchPollen() {
      const params = new URLSearchParams({
        latitude: targetLocation.latitude,
        longitude: targetLocation.longitude,
        hourly: "pm10,pm2_5",
        timezone: "Asia/Tokyo",
        forecast_days: "1"
      });

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), requestTimeoutMs);

      try {
        const response = await fetch(
          `https://air-quality-api.open-meteo.com/v1/air-quality?${params.toString()}`,
          { signal: controller.signal }
        );
        if (!response.ok) return null;
        const data = await response.json();

        const now = new Date();
        const currentHour = now.getHours();
        const pm10Values = (data.hourly?.pm10 || []).filter((v) => v !== null);
        const pm10Max = pm10Values.length ? Math.max(...pm10Values.slice(6, 18)) : null;
        const currentPm10 = data.hourly?.pm10?.[currentHour] ?? null;
        const currentPm25 = data.hourly?.pm2_5?.[currentHour] ?? null;

        return { pm10Max, currentPm10, currentPm25 };
      } catch {
        return null;
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function createPollenBanner(pollenData) {
      if (!pollenData) return "";

      const daytimePm10 = pollenData.pm10Max;
      const level = getPollenLevel(daytimePm10);
      const pm10Display = daytimePm10 !== null ? `${Math.round(daytimePm10)} μg/m³` : "—";
      const pm25Display = pollenData.currentPm25 !== null ? `${Math.round(pollenData.currentPm25)} μg/m³` : "—";
      const currentPm10Display = pollenData.currentPm10 !== null ? `${Math.round(pollenData.currentPm10)} μg/m³` : "—";
      const currentLevel = getPollenLevel(pollenData.currentPm10);

      return `
        <section class="pollen-banner">
          <div class="pollen-banner-title">🌿 花粉・大気粒子情報（今日）</div>
          <div class="pollen-grid">
            <div class="pollen-item">
              <div class="pollen-item-label">日中のPM10ピーク</div>
              <div class="pollen-item-value ${level.cls}">${pm10Display}　${level.label}</div>
            </div>
            <div class="pollen-item">
              <div class="pollen-item-label">現在のPM10</div>
              <div class="pollen-item-value ${currentLevel.cls}">${currentPm10Display}　${currentLevel.label}</div>
            </div>
            <div class="pollen-item">
              <div class="pollen-item-label">現在のPM2.5</div>
              <div class="pollen-item-value">${pm25Display}</div>
            </div>
            <div class="pollen-item">
              <div class="pollen-item-label">目安</div>
              <div class="pollen-item-value" style="font-size:0.78rem;font-weight:400;color:#78716c;">PM10が多い日は<br>花粉症症状が出やすい傾向があります</div>
            </div>
          </div>
        </section>
      `;
    }

    async function fetchWeather() {
      const params = new URLSearchParams({
        latitude: targetLocation.latitude,
        longitude: targetLocation.longitude,
        current: "temperature_2m,weather_code,apparent_temperature,wind_speed_10m",
        daily: "weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max",
        forecast_days: "7",
        timezone: "Asia/Tokyo"
      });

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), requestTimeoutMs);

      try {
        const response = await fetch(`https://api.open-meteo.com/v1/forecast?${params.toString()}`, {
          signal: controller.signal
        });

        if (!response.ok) {
        throw new Error("丹羽郡の取得に失敗しました");
        }

        const data = await response.json();
        return { location: targetLocation, current: data.current, daily: data.daily };
      } catch (error) {
        if (error.name === "AbortError") {
          throw new Error("天気情報の取得がタイムアウトしました");
        }
        throw error;
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function createCard({ current, daily }, holidays = {}, pollenData = null) {
      const info = weatherInfo(current.weather_code);
      const forecastDays = buildForecastDays(daily, holidays);
      const highRainAlert = createHighRainAlert(forecastDays);
      const pollenBanner = createPollenBanner(pollenData);

      return `
        <article class="card">
          <div class="card-head">
            <div>
              <h2 class="place">${targetLocation.name}</h2>
              <p class="region">${targetLocation.region}</p>
            </div>
            <div class="icon" aria-hidden="true">${info.icon}</div>
          </div>
          <div class="temp-row">
            <div class="temp">${formatNumber(current.temperature_2m)}°C</div>
          </div>
          <p class="condition">${info.text}</p>
          ${highRainAlert}
          ${pollenBanner}
          <div class="meta">
            <div class="meta-item">
              <div class="meta-label">体感気温</div>
              <div class="meta-value">${formatNumber(current.apparent_temperature)}°C</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">風速</div>
              <div class="meta-value">${formatNumber(current.wind_speed_10m)} km/h</div>
            </div>
          </div>
          <section class="forecast">
            <h3 class="forecast-title">明日以降の予報</h3>
            ${createForecastList(forecastDays)}
          </section>
        </article>
      `;
    }

    const CALENDAR_API_KEY = "AIzaSyAIRjo3AaUNn4vj3E_GYmKSx1o0wGykfaU";
    const HOLIDAY_CALENDAR_ID = "ja.japanese%23holiday%40group.v.calendar.google.com";

    async function fetchHolidays() {
      const today = new Date();
      const timeMin = today.toISOString();
      const timeMax = new Date(today.getTime() + 8 * 24 * 60 * 60 * 1000).toISOString();
      const url = `https://www.googleapis.com/calendar/v3/calendars/${HOLIDAY_CALENDAR_ID}/events?key=${CALENDAR_API_KEY}&timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true`;
      try {
        const res = await fetch(url);
        if (!res.ok) return {};
        const data = await res.json();
        const map = {};
        (data.items || []).forEach((item) => {
          const dateKey = item.start.date;
          if (dateKey) map[dateKey] = item.summary;
        });
        return map;
      } catch {
        return {};
      }
    }

    async function loadWeather() {
      reloadButton.disabled = true;
      statusEl.className = "status";
      statusEl.textContent = "天気情報を取得中です...";
      cardEl.innerHTML = "";

      try {
        const [result, holidays, pollenData] = await Promise.all([fetchWeather(), fetchHolidays(), fetchPollen()]);
        cardEl.innerHTML = createCard(result, holidays, pollenData);
        initializeForecastToggle();
        statusEl.textContent = "取得できました。";
        updatedAtEl.textContent = `更新時刻: ${new Date().toLocaleString("ja-JP")}`;
      } catch (error) {
        statusEl.className = "status error";
        statusEl.textContent = "天気情報の取得に失敗しました。ネット接続を確認してください。";
        updatedAtEl.textContent = "取得失敗";
        console.error(error);
      } finally {
        reloadButton.disabled = false;
      }
    }

    reloadButton.addEventListener("click", loadWeather);
    loadWeather();

    function updateClock() {
      const now = new Date();
      const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      const ss = String(now.getSeconds()).padStart(2, "0");
      document.getElementById("clock").textContent = `${hh}:${mm}:${ss}`;
      document.getElementById("clockDate").textContent =
        `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, "0")}/${String(now.getDate()).padStart(2, "0")}(${weekdays[now.getDay()]})`;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
