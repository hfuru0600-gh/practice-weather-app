<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3地点のお天気</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe3ee;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
      background: linear-gradient(180deg, #eef5ff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .container {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
    }

    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      padding: 12px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .updated-at {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status {
      margin-bottom: 16px;
      min-height: 24px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status.error {
      color: #b91c1c;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      align-items: start;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      box-shadow: var(--shadow);
      align-self: start;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .place {
      margin: 0;
      font-size: 1.25rem;
    }

    .region {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .icon {
      font-size: 2.2rem;
    }

    .temp-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 6px;
    }

    .temp {
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1;
    }

    .condition {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 1rem;
    }

    .alert-banner {
      margin: 0 0 18px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }

    .alert-title {
      margin-bottom: 6px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .alert-list {
      margin: 0;
      padding-left: 18px;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .meta-item {
      border-radius: 14px;
      background: #f8fbff;
      border: 1px solid #e5edf7;
      padding: 12px;
    }

    .meta-label {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 4px;
    }

    .meta-value {
      font-size: 1rem;
      font-weight: 600;
    }

    .forecast {
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .forecast-title {
      margin: 0 0 12px;
      font-size: 0.98rem;
      font-weight: 700;
    }

    .forecast-controls {
      display: grid;
      gap: 12px;
    }

    .forecast-toggle {
      width: 100%;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      box-shadow: none;
    }

    .forecast-list {
      display: grid;
      gap: 12px;
    }

    .forecast-list[hidden] {
      display: none;
    }

    .forecast-detail {
      padding: 14px;
      border-radius: 16px;
      background: #f8fbff;
      border: 1px solid #e5edf7;
    }

    .forecast-detail.clear {
      background: #fff9e8;
      border-color: #fde68a;
    }

    .forecast-detail.cloudy {
      background: #f3f6fb;
      border-color: #d7e0ec;
    }

    .forecast-detail.rainy {
      background: #eaf4ff;
      border-color: #7cb3ff;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.08);
    }

    .forecast-detail.snowy {
      background: #f4f7ff;
      border-color: #c7d2fe;
    }

    .forecast-detail.stormy {
      background: #fef2f2;
      border-color: #fca5a5;
    }

    .forecast-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .forecast-day {
      font-weight: 700;
    }

    .forecast-main {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
    }

    .forecast-icon {
      font-size: 1.35rem;
    }

    .forecast-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .forecast-meta-item {
      border-radius: 12px;
      background: #ffffff;
      border: 1px solid #e5edf7;
      padding: 10px;
    }

    .forecast-meta-label {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 4px;
    }

    .forecast-meta-value {
      font-weight: 600;
    }

    .forecast-rain-value {
      color: #2563eb;
    }

    .forecast-rain-value.emphasis {
      color: #b91c1c;
      font-weight: 700;
    }

    @media (max-width: 720px) {
      .header {
        flex-direction: column;
      }

      .actions {
        align-items: flex-start;
      }

      .forecast-head,
      .forecast-main {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="header">
      <div>
        <h1>丹羽郡・可児市・射水市のお天気</h1>
        <p class="lead">
          Open-Meteo の現在天気データと週間予報を使って、3地点の天候と気温を表示します。
        </p>
      </div>
      <div class="actions">
        <button id="reloadButton" type="button">最新の天気を取得</button>
        <div class="updated-at" id="updatedAt">未取得</div>
      </div>
    </section>

    <div class="status" id="status">天気情報を読み込みます...</div>
    <section class="grid" id="weatherGrid"></section>
  </main>

  <script>
    const locations = [
      { name: "丹羽郡", region: "愛知県", latitude: 35.367, longitude: 136.869 },
      { name: "可児市", region: "岐阜県", latitude: 35.426, longitude: 137.061 },
      { name: "射水市", region: "富山県", latitude: 36.717, longitude: 137.086 }
    ];

    const weatherMap = {
      0: { text: "快晴", icon: "☀️" },
      1: { text: "ほぼ晴れ", icon: "🌤️" },
      2: { text: "晴れ時々くもり", icon: "⛅" },
      3: { text: "くもり", icon: "☁️" },
      45: { text: "霧", icon: "🌫️" },
      48: { text: "霧氷", icon: "🌫️" },
      51: { text: "弱い霧雨", icon: "🌦️" },
      53: { text: "霧雨", icon: "🌦️" },
      55: { text: "強い霧雨", icon: "🌧️" },
      61: { text: "弱い雨", icon: "🌧️" },
      63: { text: "雨", icon: "🌧️" },
      65: { text: "強い雨", icon: "🌧️" },
      71: { text: "弱い雪", icon: "🌨️" },
      73: { text: "雪", icon: "❄️" },
      75: { text: "強い雪", icon: "❄️" },
      80: { text: "にわか雨", icon: "🌦️" },
      81: { text: "やや強いにわか雨", icon: "🌧️" },
      82: { text: "激しいにわか雨", icon: "⛈️" },
      95: { text: "雷雨", icon: "⛈️" }
    };

    const statusEl = document.getElementById("status");
    const gridEl = document.getElementById("weatherGrid");
    const updatedAtEl = document.getElementById("updatedAt");
    const reloadButton = document.getElementById("reloadButton");

    function weatherInfo(code) {
      return weatherMap[code] || { text: "不明", icon: "❔" };
    }

    function formatNumber(value) {
      return Math.round(value);
    }

    function formatDayLabel(dateText) {
      const date = new Date(`${dateText}T00:00:00`);
      const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
      return `${date.getMonth() + 1}/${date.getDate()}(${weekdays[date.getDay()]})`;
    }

    function buildForecastDays(daily) {
      return daily.time.slice(1).map((dateText, index) => ({
        dateLabel: formatDayLabel(dateText),
        weatherCode: daily.weather_code[index + 1],
        tempMax: formatNumber(daily.temperature_2m_max[index + 1]),
        tempMin: formatNumber(daily.temperature_2m_min[index + 1]),
        precipitationProbability: daily.precipitation_probability_max[index + 1]
      }));
    }

    function getForecastTone(day) {
      const rainyCodes = [51, 53, 55, 61, 63, 65, 80, 81, 82];
      const snowyCodes = [71, 73, 75];

      if (day.weatherCode === 95) {
        return "stormy";
      }

      if (day.precipitationProbability >= 60 || rainyCodes.includes(day.weatherCode)) {
        return "rainy";
      }

      if (snowyCodes.includes(day.weatherCode)) {
        return "snowy";
      }

      if ([3, 45, 48].includes(day.weatherCode)) {
        return "cloudy";
      }

      return "clear";
    }

    function createHighRainAlert(location, forecastDays) {
      if (location.name !== "丹羽郡") {
        return "";
      }

      const rainyDays = forecastDays.filter((day) => day.precipitationProbability >= 60);
      if (rainyDays.length === 0) {
        return "";
      }

      const items = rainyDays.map((day) => (
        `<li>${day.dateLabel}: 降水確率 ${day.precipitationProbability}%</li>`
      )).join("");

      return `
        <section class="alert-banner">
          <div class="alert-title">降水確率60%以上の日</div>
          <ul class="alert-list">${items}</ul>
        </section>
      `;
    }

    function createForecastList(days, locationIndex) {
      const items = days.map((day) => createForecastDetail(day)).join("");
      return `
        <div class="forecast-controls">
          <button class="forecast-toggle" type="button" data-location-index="${locationIndex}" aria-expanded="false">
            明日以降を表示
          </button>
          <div class="forecast-list" id="forecast-list-${locationIndex}" hidden>
            ${items}
          </div>
        </div>
      `;
    }

    function createForecastDetail(day) {
      const info = weatherInfo(day.weatherCode);
      const toneClass = getForecastTone(day);
      const rainClass = day.precipitationProbability >= 60 ? "forecast-rain-value emphasis" : "forecast-rain-value";
      return `
        <div class="forecast-detail ${toneClass}">
          <div class="forecast-head">
            <div class="forecast-day">${day.dateLabel}</div>
            <div class="forecast-main">
              <span class="forecast-icon" aria-hidden="true">${info.icon}</span>
              <span>${info.text}</span>
            </div>
          </div>
          <div class="forecast-meta">
            <div class="forecast-meta-item">
              <div class="forecast-meta-label">最高 / 最低気温</div>
              <div class="forecast-meta-value">${day.tempMax}°C / ${day.tempMin}°C</div>
            </div>
            <div class="forecast-meta-item">
              <div class="forecast-meta-label">降水確率</div>
              <div class="${rainClass}">${day.precipitationProbability}%</div>
            </div>
          </div>
        </div>
      `;
    }

    function initializeForecastToggles() {
      const buttons = document.querySelectorAll(".forecast-toggle");

      buttons.forEach((button) => {
        const locationIndex = Number(button.dataset.locationIndex);
        const listEl = document.getElementById(`forecast-list-${locationIndex}`);

        button.addEventListener("click", () => {
          const isExpanded = button.getAttribute("aria-expanded") === "true";
          button.setAttribute("aria-expanded", String(!isExpanded));
          button.textContent = isExpanded ? "明日以降を表示" : "明日以降を隠す";
          listEl.hidden = isExpanded;
        });
      });
    }

    async function fetchWeather(location) {
      const params = new URLSearchParams({
        latitude: location.latitude,
        longitude: location.longitude,
        current: "temperature_2m,weather_code,apparent_temperature,wind_speed_10m",
        daily: "weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max",
        forecast_days: "7",
        timezone: "Asia/Tokyo"
      });

      const response = await fetch(`https://api.open-meteo.com/v1/forecast?${params.toString()}`);
      if (!response.ok) {
        throw new Error(`${location.name} の取得に失敗しました`);
      }

      const data = await response.json();
      return { location, current: data.current, daily: data.daily };
    }

    function createCard({ location, current, daily }, locationIndex) {
      const info = weatherInfo(current.weather_code);
      const forecastDays = buildForecastDays(daily);
      const highRainAlert = createHighRainAlert(location, forecastDays);

      return `
        <article class="card">
          <div class="card-head">
            <div>
              <h2 class="place">${location.name}</h2>
              <p class="region">${location.region}</p>
            </div>
            <div class="icon" aria-hidden="true">${info.icon}</div>
          </div>
          <div class="temp-row">
            <div class="temp">${formatNumber(current.temperature_2m)}°C</div>
          </div>
          <p class="condition">${info.text}</p>
          ${highRainAlert}
          <div class="meta">
            <div class="meta-item">
              <div class="meta-label">体感気温</div>
              <div class="meta-value">${formatNumber(current.apparent_temperature)}°C</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">風速</div>
              <div class="meta-value">${formatNumber(current.wind_speed_10m)} km/h</div>
            </div>
          </div>
          <section class="forecast">
            <h3 class="forecast-title">明日以降の予報</h3>
            ${createForecastList(forecastDays, locationIndex)}
          </section>
        </article>
      `;
    }

    async function loadWeather() {
      reloadButton.disabled = true;
      statusEl.className = "status";
      statusEl.textContent = "天気情報を取得中です...";
      gridEl.innerHTML = "";

      try {
        const results = await Promise.all(locations.map(fetchWeather));
        gridEl.innerHTML = results.map((result, index) => createCard(result, index)).join("");
        initializeForecastToggles();
        statusEl.textContent = "取得できました。";
        updatedAtEl.textContent = `更新時刻: ${new Date().toLocaleString("ja-JP")}`;
      } catch (error) {
        statusEl.className = "status error";
        statusEl.textContent = "天気情報の取得に失敗しました。ネット接続を確認してください。";
        updatedAtEl.textContent = "取得失敗";
        console.error(error);
      } finally {
        reloadButton.disabled = false;
      }
    }

    reloadButton.addEventListener("click", loadWeather);
    loadWeather();
  </script>
</body>
</html>
