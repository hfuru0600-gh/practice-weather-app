<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>練習作品集</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #4f8ef7;
      --text: #e8eaf0;
      --muted: #7a7f99;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 16px;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 48px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.2s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    .card-icon { font-size: 2rem; }

    .card-title {
      font-size: 1.15rem;
      font-weight: 600;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .card-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .card-links a {
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      background: rgba(79, 142, 247, 0.1);
      border: 1px solid rgba(79, 142, 247, 0.3);
      border-radius: 6px;
      padding: 3px 10px;
      transition: background 0.15s;
    }

    .card-links a:hover { background: rgba(79, 142, 247, 0.25); }

    footer {
      margin-top: 60px;
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <h1>練習作品集</h1>
  <p class="subtitle">Cursor 練習プロジェクト一覧</p>

  <div class="grid">
    <div class="card">
      <div class="card-icon">⛅</div>
      <div class="card-title">お天気アプリ</div>
      <div class="card-desc">丹羽郡・可児市・射水市の現在天気と1週間予報を表示。降水確率の色分け・アラート機能付き。</div>
      <div class="card-links">
        <a href="weather-app/index.html">3地点版</a>
        <a href="weather-app/index2.html">丹羽郡のみ</a>
      </div>
    </div>
  </div>

  <footer>hfuru0600-gh / Cursor practice</footer>
</body>
</html>
